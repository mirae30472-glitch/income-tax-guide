<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소득세 실무 가이드 — 세무법인한영 신우지점</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; background: #f5f6f8; color: #222; }
    header { background: #1a3a5c; color: #fff; padding: 32px 24px 24px; }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p  { font-size: 0.85rem; margin-top: 6px; opacity: 0.75; }
    main { max-width: 680px; margin: 32px auto; padding: 0 16px; }
    .section-title { font-size: 0.75rem; font-weight: 600; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin: 28px 0 10px; }
    .card-list { display: flex; flex-direction: column; gap: 10px; }
    .card { display: flex; align-items: center; gap: 16px; background: #fff; border-radius: 10px; padding: 16px 20px; text-decoration: none; color: inherit; box-shadow: 0 1px 4px rgba(0,0,0,.07); transition: box-shadow .15s; }
    .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.13); }
    .card .icon { font-size: 1.5rem; flex-shrink: 0; width: 36px; text-align: center; }
    .card .info .title { font-size: 0.95rem; font-weight: 600; }
    .card .info .desc  { font-size: 0.78rem; color: #666; margin-top: 3px; }
    .badge { display: inline-block; font-size: 0.65rem; font-weight: 600; border-radius: 4px; padding: 2px 6px; margin-left: 8px; vertical-align: middle; }
    .badge.html { background: #e8f4ff; color: #1a6bbf; }
    .badge.pdf  { background: #fff0f0; color: #c0392b; }
    footer { text-align: center; font-size: 0.75rem; color: #aaa; padding: 40px 0 24px; }
  </style>
</head>
<body>
  <header>
    <h1>소득세 실무 가이드</h1>
    <p>세무법인한영 신우지점 · 직원 내부 참고자료</p>
  </header>
  <main>

    <div class="card-list">
      <a class="card" href="소득세_실무가이드.html">
        <span class="icon">📋</span>
        <div class="info">
          <div class="title">소득세 실무가이드</div>
          <div class="desc">종합소득세 실무 전체 내용 · 검색·메모 기능 포함</div>
        </div>
      </a>
    </div>

  </main>
  <footer>세무법인한영 신우지점 · 내부 참고용 · 최종 해석은 세무사 검수 기준</footer>
</body>
</html>
